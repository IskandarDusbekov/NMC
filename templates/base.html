{% load static core_tags %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title|default:"NMC" }} | NMC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef9ff',
                            100: '#daf1ff',
                            500: '#0f8fd8',
                            600: '#0d77b3',
                            700: '#0c5f8d',
                        },
                    },
                    boxShadow: {
                        soft: '0 12px 36px rgba(15, 23, 42, 0.08)',
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="{% static 'css/app.css' %}?v=20260421-dashboard-polish">
</head>
<body class="min-h-screen bg-slate-50 text-slate-900" style="font-family: Inter, sans-serif;">
    <div id="sidebar-overlay" class="fixed inset-0 z-30 hidden bg-slate-950/40 backdrop-blur-sm md:hidden"></div>
    {% include "includes/sidebar.html" %}
    <div class="min-h-screen md:pl-72">
        {% include "includes/header.html" %}
        <main class="px-4 pb-28 pt-6 md:px-8 md:pb-12">
            {% include "includes/messages.html" %}
            {% block content %}{% endblock %}
        </main>
    </div>
    {% include "includes/mobile_nav.html" %}
    <script src="{% static 'js/app.js' %}?v=20260421-conversion-ferma"></script>
</body>
</html>
