{% extends "base.html" %}

{% block content %}
    <section class="mx-auto max-w-2xl">
        <div class="rounded-[32px] border border-white/70 bg-white p-8 shadow-soft">
            <p class="text-xs font-semibold uppercase tracking-[0.18em] text-rose-500">Danger zone</p>
            <h2 class="mt-3 text-3xl font-extrabold text-slate-900">{{ page_title }}</h2>
            <p class="mt-2 text-sm text-slate-500">{{ page_subtitle }}</p>
            <div class="mt-6 rounded-2xl border border-rose-100 bg-rose-50 px-4 py-4 text-sm text-rose-700">
                <strong>{{ object_label }}</strong> ni ochirish uchun ikki bosqichli tasdiqlash ishlatiladi.
            </div>
            <form method="post" class="mt-6 space-y-5">
                {% csrf_token %}
                {% include "includes/form_field.html" with field=form.confirmation %}
                <div class="flex flex-col gap-3 sm:flex-row">
                    <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-rose-600 px-5 py-3 text-sm font-semibold text-white hover:bg-rose-700">Ochirishni tasdiqlash</button>
                    <a href="{{ cancel_url }}" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 px-5 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50">Bekor qilish</a>
                </div>
            </form>
        </div>
    </section>
{% endblock %}
