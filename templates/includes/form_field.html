<div class="flex flex-col gap-1.5">
    <label for="{{ field.id_for_label }}" class="text-sm font-semibold text-slate-700">
        {{ field.label }}
        {% if field.field.required %}<span class="ml-0.5 text-rose-500">*</span>{% endif %}
    </label>
    {{ field }}
    {% if field.help_text %}
        <p class="text-xs text-slate-400">{{ field.help_text }}</p>
    {% endif %}
    {% for error in field.errors %}
        <p class="flex items-center gap-1.5 text-xs font-medium text-rose-600">
            <svg class="h-3.5 w-3.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            {{ error }}
        </p>
    {% endfor %}
</div>
