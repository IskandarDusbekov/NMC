<div>
    <label for="{{ field.id_for_label }}" class="text-sm font-semibold text-slate-700">{{ field.label }}</label>
    {{ field }}
    {% if field.help_text %}
        <p class="mt-2 text-xs text-slate-400">{{ field.help_text }}</p>
    {% endif %}
    {% for error in field.errors %}
        <p class="mt-2 text-sm text-rose-600">{{ error }}</p>
    {% endfor %}
</div>
