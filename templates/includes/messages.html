{% if messages %}
    <div class="mb-5 space-y-3">
        {% for message in messages %}
            <div class="rounded-2xl border px-4 py-3 text-sm shadow-sm {% if message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-700{% elif message.tags == 'error' %}border-rose-200 bg-rose-50 text-rose-700{% elif message.tags == 'warning' %}border-amber-200 bg-amber-50 text-amber-700{% else %}border-sky-200 bg-sky-50 text-sky-700{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
{% endif %}
