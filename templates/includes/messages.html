{% if messages %}
<div class="mb-4 space-y-2" id="flash-messages">
    {% for message in messages %}
    <div class="flash-msg flex items-start gap-3 rounded-2xl border px-4 py-3 text-sm font-medium shadow-sm
        {% if message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800
        {% elif message.tags == 'error' %}border-rose-200 bg-rose-50 text-rose-800
        {% elif message.tags == 'warning' %}border-amber-200 bg-amber-50 text-amber-800
        {% else %}border-blue-200 bg-blue-50 text-blue-800{% endif %}"
        style="animation: slideIn .25s ease;">
        <span class="mt-0.5 shrink-0 text-base leading-none">
            {% if message.tags == 'success' %}✅
            {% elif message.tags == 'error' %}❌
            {% elif message.tags == 'warning' %}⚠️
            {% else %}ℹ️{% endif %}
        </span>
        <span class="flex-1">{{ message }}</span>
        <button type="button" onclick="this.closest('.flash-msg').remove()"
                class="ml-2 shrink-0 text-current opacity-50 hover:opacity-100 transition-opacity">
            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>
<style>
@keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
<script>
setTimeout(function() {
    const msgs = document.getElementById('flash-messages');
    if (msgs) {
        msgs.style.transition = 'opacity .4s ease';
        msgs.style.opacity = '0';
        setTimeout(() => msgs.remove(), 400);
    }
}, 6000);
</script>
{% endif %}
