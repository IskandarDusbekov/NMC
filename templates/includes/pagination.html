{% if is_paginated %}
    <div class="mt-6 flex items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm">
        <p class="text-slate-500">Sahifa {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}</p>
        <div class="flex items-center gap-2">
            {% if page_obj.has_previous %}
                <a href="?page={{ page_obj.previous_page_number }}" class="rounded-xl border border-slate-200 px-3 py-2 text-slate-600 hover:bg-slate-50">Oldingi</a>
            {% endif %}
            {% if page_obj.has_next %}
                <a href="?page={{ page_obj.next_page_number }}" class="rounded-xl border border-slate-200 px-3 py-2 text-slate-600 hover:bg-slate-50">Keyingi</a>
            {% endif %}
        </div>
    </div>
{% endif %}
