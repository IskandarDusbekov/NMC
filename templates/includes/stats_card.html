<div class="stat-card rounded-2xl border border-slate-100 bg-white p-5 shadow-sm">
    <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">{{ title }}</p>
    <p class="mt-3 text-2xl font-extrabold text-slate-900">{{ value }}</p>
    {% if hint %}
        <p class="mt-2 text-sm text-slate-500">{{ hint }}</p>
    {% endif %}
</div>
